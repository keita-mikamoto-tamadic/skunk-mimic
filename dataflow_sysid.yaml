# Dataflow for system identification data collection (real hardware).
# sysid_controller drives RCM state machine, RCM sends motor_commands to dcm_frontend.
# data_recorder captures all data for offline sysid.
nodes:

  - id: robot_control_manager
    path: src/cpp/node/robot_control_manager/build/robot_control_manager
    inputs:
      watchdog: dora/timer/millis/30
      state_command: sysid_controller/state_command
      motor_status: dcm_frontend/motor_status
      run_command: sysid_controller/run_command
    outputs:
      - motor_commands
      - state_status

  - id: sysid_controller
    path: dynamic
    inputs:
      state_status: robot_control_manager/state_status
      recorder_ready: data_recorder/recorder_ready
      motor_status: dcm_frontend/motor_status
    outputs:
      - state_command
      - run_command

  - id: dcm_frontend
    path: src/cpp/node/dcm_frontend/build/dcm_frontend
    inputs:
      motor_commands: robot_control_manager/motor_commands
      raw_status: dcm_backend/raw_status
      raw_imu: imu_node/raw_imu
      watchdog: dora/timer/millis/30
    outputs:
      - motor_status
      - raw_commands
      - imu_data

  - id: dcm_backend
    path: src/cpp/node/can_backend/build/can_backend
    inputs:
      tick: dora/timer/millis/3
      raw_commands: dcm_frontend/raw_commands
    outputs:
      - raw_status

  - id: imu_node
    path: src/cpp/node/imu_node/build/imu_node
    inputs:
      tick: dora/timer/millis/3
    outputs:
      - raw_imu

  - id: data_recorder
    path: dynamic
    inputs:
      motor_commands: robot_control_manager/motor_commands
      motor_status: dcm_frontend/motor_status
      imu_data: dcm_frontend/imu_data
    outputs:
      - recorder_ready
