# Dataflow for system identification data collection (real hardware).
# sysid_controller drives RCM state machine, RCM sends motor_commands to device_control_manager.
# data_recorder captures all data for offline sysid.
nodes:

  - id: robot_control_manager
    path: src/cpp/node/robot_control_manager/build/robot_control_manager
    inputs:
      watchdog: dora/timer/millis/30
      state_command: sysid_controller/state_command
      motor_status: device_control_manager/motor_status
      run_command: sysid_controller/run_command
    outputs:
      - motor_commands
      - state_status

  - id: sysid_controller
    path: dynamic
    inputs:
      state_status: robot_control_manager/state_status
      recorder_ready: data_recorder/recorder_ready
      motor_status: device_control_manager/motor_status
    outputs:
      - state_command
      - run_command

  - id: device_control_manager
    path: src/cpp/node/device_control_manager/build/device_control_manager
    inputs:
      tick: dora/timer/millis/3
      motor_commands: robot_control_manager/motor_commands
    outputs:
      - motor_status

  - id: imu_node
    path: src/cpp/node/imu_node/build/imu_node
    inputs:
      tick: dora/timer/millis/3
    outputs:
      - imu_data

  - id: data_recorder
    path: dynamic
    inputs:
      motor_commands: robot_control_manager/motor_commands
      motor_status: device_control_manager/motor_status
      imu_data: imu_node/imu_data
    outputs:
      - recorder_ready
