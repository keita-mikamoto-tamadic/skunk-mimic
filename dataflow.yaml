nodes:

  - id: robot_control_manager
    path: src/cpp/node/robot_control_manager/build/robot_control_manager
    inputs:
      watchdog: dora/timer/millis/30
      state_command: dummy_input/state_command
      motor_status: device_control_manager/motor_status
      imu_data: device_control_manager/imu_data
    outputs:
      - motor_commands
      - state_status
      - estimated_state

  - id: device_control_manager
    path: src/cpp/node/device_control_manager/build/device_control_manager
    inputs:
      tick: dora/timer/millis/3
      motor_commands: robot_control_manager/motor_commands
      raw_imu: imu_node/raw_imu
    outputs:
      - motor_status
      - imu_data
      - latency

  - id: imu_node
    path: src/cpp/node/imu_node/build/imu_node
    inputs:
      tick: dora/timer/millis/3
    outputs:
      - raw_imu

  - id: dummy_input
    path: dynamic
    outputs:
      - state_command

  - id: data_viewer
    path: dynamic
    inputs:
      tick: dora/timer/millis/100
      motor_status:
        source: device_control_manager/motor_status
        queue_size: 1
      state_status:
        source: robot_control_manager/state_status
        queue_size: 1
      imu_data:
        source: device_control_manager/imu_data
        queue_size: 1
      latency:
        source: device_control_manager/latency
        queue_size: 1
      estimated_state:
        source: robot_control_manager/estimated_state
        queue_size: 1

  - id: rerun_logger
    path: dynamic
    inputs:
      motor_status:
        source: device_control_manager/motor_status
        queue_size: 1
      motor_commands:
        source: robot_control_manager/motor_commands
        queue_size: 1
      imu_data:
        source: device_control_manager/imu_data
        queue_size: 1
      estimated_state:
        source: robot_control_manager/estimated_state
        queue_size: 1
      state_status:
        source: robot_control_manager/state_status
        queue_size: 1
