nodes:

  - id: state_manager
    path: src/cpp/node/state_manage/build/state_manager
    inputs:
      tick: dora/timer/millis/3
      state_command: dummy_input/state_command
      motor_status: device_control/motor_status
    outputs:
      - motor_commands
      - state_status

  - id: device_control
    path: src/cpp/node/device_control/build/device_control
    inputs:
      motor_commands: state_manager/motor_commands
    outputs:
      - motor_status

  - id: dummy_input
    path: dynamic
    outputs:
      - state_command
      
  - id: data_viewer
    path: dynamic
    inputs:
      motor_status: device_control/motor_status
      state_status: state_manager/state_status
