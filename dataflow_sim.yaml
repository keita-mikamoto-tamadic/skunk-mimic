nodes:

  - id: robot_control_manager
    path: src/cpp/node/robot_control_manager/build/robot_control_manager
    inputs:
      watchdog: dora/timer/millis/30
      state_command: dummy_input/state_command
      motor_status: mujoco_backend/motor_status
      imu_data: mujoco_backend/imu_data
    outputs:
      - motor_commands
      - state_status
      - estimated_state

  - id: mujoco_backend
    path: dynamic
    inputs:
      tick: dora/timer/millis/3
      motor_commands: robot_control_manager/motor_commands
    outputs:
      - motor_status
      - imu_data

  - id: dummy_input
    path: dynamic
    outputs:
      - state_command

  - id: data_viewer
    path: dynamic
    inputs:
      tick: dora/timer/millis/100
      motor_status:
        source: mujoco_backend/motor_status
        queue_size: 1
      state_status:
        source: robot_control_manager/state_status
        queue_size: 1
      imu_data:
        source: mujoco_backend/imu_data
        queue_size: 1
      estimated_state:
        source: robot_control_manager/estimated_state
        queue_size: 1

  - id: rerun_logger
    path: dynamic
    inputs:
      motor_status:
        source: mujoco_backend/motor_status
        queue_size: 1
      motor_commands:
        source: robot_control_manager/motor_commands
        queue_size: 1
      imu_data:
        source: mujoco_backend/imu_data
        queue_size: 1
      estimated_state:
        source: robot_control_manager/estimated_state
        queue_size: 1
      state_status:
        source: robot_control_manager/state_status
        queue_size: 1
